name: ATOK 24/7 Auto Bot

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  schedule:
    - cron: '0 */5 * * *' # প্রতি ৫ ঘণ্টা পর পর অটোমেটিক চলবে

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Run ATOK Bot
        env:
          PYTHONUNBUFFERED: "1"  # গিটহাবে লাইভ লগ দেখার জন্য
        run: |
          python bot.py
